<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px;
    height: 420px;
    background: linear-gradient(135deg, #0a0e17 0%, #0d1b2a 40%, #1b2838 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-pattern {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
      radial-gradient(circle at 60% 20%, rgba(251, 191, 36, 0.04) 0%, transparent 40%);
  }

  .grid-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .icon-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 4px;
  }

  .ball {
    font-size: 52px;
    filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.3));
  }

  h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    font-size: 18px;
    color: #94a3b8;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #22c55e, transparent);
    margin: 6px 0;
  }

  .features {
    display: flex;
    gap: 28px;
    margin-top: 8px;
  }

  .feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .feature-icon {
    font-size: 24px;
  }

  .feature-label {
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
  }

  .badge {
    margin-top: 12px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .badge-item {
    font-size: 11px;
    color: #475569;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border: 1px solid rgba(71, 85, 105, 0.3);
    border-radius: 20px;
  }

  .pulse-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 6px;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
  }
</style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="grid-lines"></div>
  <div class="content">
    <div class="icon-row">
      <span class="ball">⚽</span>
      <h1>Whistle</h1>
    </div>
    <div class="tagline">AI Trading Intelligence</div>
    <div class="divider"></div>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">📡</span>
        <span class="feature-label">Live Streams</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔍</span>
        <span class="feature-label">Divergence</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🎯</span>
        <span class="feature-label">Edge Tracking</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🤖</span>
        <span class="feature-label">AI Narration</span>
      </div>
    </div>
    <div class="badge">
      <span class="badge-item"><span class="pulse-dot"></span>FIFA World Cup 2026</span>
      <span class="badge-item">Powered by TxODDS</span>
      <span class="badge-item">Solana On-Chain</span>
    </div>
  </div>
</body>
</html>
